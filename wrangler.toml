# Cloudflare Pages Functions 配置 —— 阶段 B
# 站点静态导出放 out/，Functions 在 functions/ 目录提供 API。

name = "yuyepage"
compatibility_date = "2026-07-01"
pages_build_output_dir = "out"

# D1 数据库：存文章 + 评论
[[d1_databases]]
binding = "yuyepage_db"
database_name = "yuyepage-db"
database_id = "395f3cec-95ed-44a1-a0a5-855c926d32fc"

# 本地开发用：wrangler pages dev 时加载 .dev.vars 里的环境变量
[vars]
# 部署时通过 Cloudflare Dashboard 配置环境变量
# - ADMIN_TOKEN：cookie 签名 HMAC 密钥
# - GITHUB_TOKEN：GitHub PAT（repo 权限），后台保存后触发 GitHub Actions 重建用
# - GITHUB_REPO：仓库全名（可省，默认 yuyeyyy01/yuyeyyy.github.io）
# NEXT_PUBLIC_BASE_PATH 在根路径部署时留空
