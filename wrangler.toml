# Cloudflare Pages Functions 配置 —— 阶段 B
# 站点静态导出放 out/，Functions 在 functions/ 目录提供 API。

name = "yuyepage"
compatibility_date = "2026-07-01"
pages_build_output_dir = "out"

# D1 数据库：存文章 + 评论
[[d1_databases]]
binding = "yuyepage_db"
database_name = "yuyepage-db"
database_id = "395f3cec-95ed-44a1-a0a5-855c926d32fc"

# R2 存储：文章配图上传（PR3 启用）
# [[r2_buckets]]
# binding = "yuyepage_images"
# bucket_name = "yuyepage-images"

# 本地开发用：wrangler pages dev 时加载 .dev.vars 里的环境变量
[vars]
# 部署时通过 wrangler pages deploy --var 设置或 dashboard 配置
# NEXT_PUBLIC_BASE_PATH 在根路径部署时留空
