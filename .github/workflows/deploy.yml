name: Build & Deploy to Cloudflare Pages

# 触发方式：
#   1. repository_dispatch (event_type: rebuild) —— 后台保存文章后由 Functions 触发
#      （见 functions/_lib.ts triggerDeploy，调 GitHub dispatches API）
#   2. push 到 main —— 常规开发改代码后自动部署
#   3. workflow_dispatch —— 手动在 Actions 页面点 "Run workflow"
#
# 作用：从远程 D1 导出文章 → next build → wrangler pages deploy 上传产物。
#   等价于本地 `npm run cf:deploy:root`。
#
# 需要的 GitHub Secrets（仓库 Settings → Secrets and variables → Actions）：
#   CLOUDFLARE_API_TOKEN  —— Cloudflare API token，权限：Account.Pages Edit + D1 Edit
#   CLOUDFLARE_ACCOUNT_ID —— 账号 ID（dash.cloudflare.com 右侧或 wrangler whoami）

on:
  repository_dispatch:
    types: [rebuild]
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只跑一个部署，避免并发上传产物冲突；后来的排队/取消旧的
concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export posts from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/export-d1-posts.mjs

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://yuyepage.pages.dev
        run: npm run build

      - name: Generate search index
        run: npm run index

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name yuyepage --branch main
