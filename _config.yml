title: "Yuyeyyy 的图形学小站"        # 网站标题（浏览器标签 / 页头）
description: "记录Unity渲染、Shader、图形学学习笔记。"  # 简短描述
lang: "zh-CN"
timezone: "Asia/Tokyo"

# 你 GitHub 的用户名和仓库名（记得改成自己的）
url: "https://yuyeyyy01.github.io"    # 用户站点根域名（去掉子路径）
baseurl: ""                           # username.github.io 保持空字符串

author:
  name: "yuyeyyy"
  email: "youremail@example.com"
  avatar: "/assets/me.png"            # 头像路径（与 index.html 中实际文件一致）
  bio: "Unity 图形 / Shader / PBR / SSS / Hair 渲染研究中。"

# 社交链接（可删掉不用的）
social_links:
  github: "https://github.com/yuyeyyy"
  twitter: "https://x.com/yourname"
  bilibili: "https://space.bilibili.com/xxxxxxx"

# 使用的主题
theme: minima

# 导航栏（顶部菜单）
header_pages:
  - index.md
  - about.md

# Markdown/高亮设置（保持默认即可）
markdown: kramdown
highlighter: rouge

# 插件（GitHub Pages 支持的插件）
plugins:
  - jekyll-feed
  - jekyll-sitemap

# index.html 是纯静态首页，不经过 Jekyll 主题模板渲染
# 排除多余文件被 Jekyll 处理
exclude:
  - README.md
